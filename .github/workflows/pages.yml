name: deploy-pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Allow GITHUB_TOKEN to deploy to Pages and verify the origin.
permissions:
  contents: read
  pages: write
  id-token: write

# One concurrent deploy; a newer push cancels an in-flight one.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: website
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: website/package-lock.json
      - run: npm ci
      # KaTeX renders with throwOnError:false, so a malformed formula ships as
      # red error text instead of failing the build. Fast pre-build lint of
      # every $…$ expression; catches most problems before the slower build.
      - run: npm run check:math
      - run: npm run build
      # Authoritative KaTeX gate: grep the *built* pages for render errors that
      # the pre-build lint can miss (e.g. a display block whose $$ is glued to
      # content or indented in a list, which remark-math splits).
      - run: npm run check:built-math
      # Docusaurus link-checks the pages it renders, but not the hand-written
      # museum HTML under static/. This validates the museum's links and assets
      # (and the course↔museum wiring) against the built tree before we deploy.
      - run: npm run check:museum
      - uses: actions/upload-pages-artifact@v5
        with:
          path: website/build

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url || steps.deployment_2.outputs.page_url || steps.deployment_3.outputs.page_url }}
    # The Pages backend intermittently returns "Deployment failed, try again
    # later" from its status poll even though the artifact built and uploaded
    # fine. deploy-pages treats that as terminal, so we re-invoke it up to three
    # times with a pause between attempts; only a third straight failure fails
    # the job. (nick-fields/retry can't wrap a `uses:` action, hence this form.)
    steps:
      # Attempt 1
      - id: deployment
        uses: actions/deploy-pages@v5
        continue-on-error: true

      # Attempt 2 — only if attempt 1 failed
      - name: Pause before retry
        if: steps.deployment.outcome == 'failure'
        run: sleep 60
      - id: deployment_2
        if: steps.deployment.outcome == 'failure'
        uses: actions/deploy-pages@v5
        continue-on-error: true

      # Attempt 3 (final) — only if attempts 1 and 2 both failed; not
      # continue-on-error, so its failure is the one that fails the job.
      - name: Pause before final retry
        if: steps.deployment.outcome == 'failure' && steps.deployment_2.outcome == 'failure'
        run: sleep 90
      - id: deployment_3
        if: steps.deployment.outcome == 'failure' && steps.deployment_2.outcome == 'failure'
        uses: actions/deploy-pages@v5
