name: verify course

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Rust toolchain
        run: rustup update stable && rustup default stable
      - name: Stubs compile
        run: cargo check --workspace
      - name: Course self-check (all lab suites vs reference solutions)
        run: ./grade verify
