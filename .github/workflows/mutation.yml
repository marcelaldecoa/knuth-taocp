name: mutation testing

# Mutation testing proves the stage suites actually *bite*: cargo-mutants
# seeds bugs into the reference implementations and checks that some stage
# test catches each one. A surviving mutant is a hole in a test suite.
#
# This is deliberately NOT on push/pull_request: across 22 reference modules it
# generates hundreds of mutants, each re-running the workspace tests, so a full
# sweep is far too slow to gate every commit. Instead the sweep is SHARDED — a
# setup job lists the reference files (optionally narrowed by a dispatch regex),
# and a fan-out matrix mutates one file per runner. Each shard is independent
# and bounded by a hard per-mutant timeout, so a mutated infinite loop can never
# hang the sweep, and the whole set of 22 modules finishes in parallel instead
# of serially on one runner.
#
# Run it on demand from the Actions tab (blank = all modules, or a regex like
# "m1[0-9]" for a subset), or let the weekly schedule report drift.

on:
  workflow_dispatch:
    inputs:
      package:
        description: "Regex selecting reference file(s) to mutate (e.g. m04 or m1[0-9]); blank = all 22"
        required: false
        default: ""
  schedule:
    # Mondays 06:00 UTC.
    - cron: "0 6 * * 1"

# A newer dispatch supersedes an in-flight sweep of the same ref.
concurrency:
  group: mutation-${{ github.ref }}
  cancel-in-progress: true

env:
  # Pinned so the cached binary and a fresh install are always the same
  # version; bump this (and the cache key rotates with it) to upgrade.
  CARGO_MUTANTS_VERSION: "27.1.0"

jobs:
  setup:
    name: select modules to mutate
    runs-on: ubuntu-latest
    outputs:
      modules: ${{ steps.list.outputs.modules }}
      count: ${{ steps.list.outputs.count }}
    steps:
      - uses: actions/checkout@v5
      - id: list
        name: list reference files (honoring the optional filter)
        # The dispatch input reaches the shell via an env var, never by
        # template interpolation into the script — a quote in the regex must
        # not be able to break out of (or into) the shell.
        env:
          FILTER: ${{ github.event.inputs.package }}
        run: |
          cd reference/src
          files=$(ls m[0-9]*.rs | sort)
          if [ -n "$FILTER" ]; then
            files=$(printf '%s\n' $files | grep -E -- "$FILTER" || true)
          fi
          if [ -z "$files" ]; then
            echo "::error::no reference files matched filter '$FILTER'"; exit 1
          fi
          json=$(printf '%s\n' $files | jq -R . | jq -s -c .)
          count=$(printf '%s\n' $files | grep -c .)
          echo "modules=$json" >> "$GITHUB_OUTPUT"
          echo "count=$count" >> "$GITHUB_OUTPUT"
          echo "Selected $count module(s): $json"

  mutants:
    name: "mutate ${{ matrix.module }}"
    needs: setup
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        module: ${{ fromJSON(needs.setup.outputs.modules) }}
    steps:
      - uses: actions/checkout@v5
      - name: Install Rust
        run: rustup toolchain install stable --profile minimal && rustup default stable
      - name: Cache cargo-mutants
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/cargo-mutants
          # Versioned key: bumping CARGO_MUTANTS_VERSION below invalidates the
          # cache, so the sweep can never pin silently to a stale binary.
          key: cargo-mutants-bin-${{ env.CARGO_MUTANTS_VERSION }}
      - name: Install cargo-mutants
        # Only install when the cache didn't restore a binary; a genuine
        # install failure fails the job instead of being masked.
        run: command -v cargo-mutants || cargo install cargo-mutants --version "$CARGO_MUTANTS_VERSION" --locked
      - name: Mutate this reference file; run lab suites (with solutions) against it
        # Mutate only this shard's file inside taocp-reference. Forwarded args
        # run the whole workspace's tests with --features solutions, so the lab
        # suites exercise the mutated reference. --timeout caps any single
        # mutant (e.g. one that turns a loop condition into an infinite loop).
        #
        # A shard FAILS only when a viable mutant SURVIVED (mutants.out/
        # missed.txt non-empty) — the real "a stage suite didn't bite" signal.
        # cargo-mutants also exits non-zero on TIMEOUT, but a timeout means the
        # mutant made a test hang (e.g. %→/ inside a gcd loop = infinite loop)
        # and is effectively caught — surfaced as a warning, not a failure.
        # Baseline/build failures (no outcomes.json) still fail loudly.
        run: |
          set +e
          cargo mutants --no-shuffle -j 2 --timeout 120 \
            --package taocp-reference \
            --file ${{ matrix.module }} \
            -- --workspace --features solutions
          code=$?
          echo "cargo-mutants exit code: $code"
          if [ ! -f mutants.out/outcomes.json ]; then
            echo "::error::${{ matrix.module }}: no outcomes.json — baseline/build failure (exit $code)"
            exit 1
          fi
          if [ -s mutants.out/timeout.txt ]; then
            echo "::warning::${{ matrix.module }}: timeouts (infinite-loop mutants, treated as caught):"
            sed 's/^/  timeout: /' mutants.out/timeout.txt
          fi
          if [ -s mutants.out/missed.txt ]; then
            echo "::error::${{ matrix.module }}: viable mutant(s) SURVIVED — a stage suite has a gap:"
            sed 's/^/  survived: /' mutants.out/missed.txt
            exit 1
          fi
          echo "${{ matrix.module }}: no survivors — every viable mutant was caught."
          exit 0
      - name: Upload this shard's mutants report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mutants-${{ matrix.module }}
          path: mutants.out/
          if-no-files-found: ignore

  summary:
    name: sweep result
    needs: [setup, mutants]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Roll up shard results
        run: |
          echo "Mutated ${{ needs.setup.outputs.count }} module(s); aggregate result: ${{ needs.mutants.result }}"
          if [ "${{ needs.mutants.result }}" != "success" ]; then
            echo "::warning::at least one shard failed or found surviving mutants — inspect the mutants-* artifacts"
            exit 1
          fi
          echo "All shards clean: every seeded mutant was caught by a stage suite."
